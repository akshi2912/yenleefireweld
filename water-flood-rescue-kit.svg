<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffcf6a"/><stop offset="100%" stop-color="#ff5b1f"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff5b1f"/><stop offset="100%" stop-color="#ffcf6a"/>
    </linearGradient>
  </defs>
  <circle cx="200" cy="200" r="190" fill="#0a0d14" stroke="#ffcf6a" stroke-opacity="0.2" stroke-width="2"/>
  <!-- life ring -->
  <circle cx="200" cy="165" r="78" fill="none" stroke="url(#g3)" stroke-width="20"/>
  <circle cx="200" cy="165" r="78" fill="none" stroke="#fff" stroke-width="20" stroke-dasharray="30 30" stroke-dashoffset="15" opacity="0.9"/>
  <circle cx="200" cy="165" r="40" fill="#0a0d14"/>
  <!-- throw rope trailing -->
  <path d="M150 232 C 120 250, 110 280, 130 305" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
  <path d="M250 232 C 280 250, 290 280, 270 305" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
  <!-- water waves -->
  <path d="M70 320 q 20 -14 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0" fill="none" stroke="url(#wave)" stroke-width="7" stroke-linecap="round"/>
  <path d="M70 340 q 20 -14 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
</svg>
