<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12141c"/>
      <stop offset="100%" stop-color="#05060a"/>
    </linearGradient>
    <linearGradient id="fireGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffcf6a"/>
      <stop offset="100%" stop-color="#ff5b1f"/>
    </linearGradient>
  </defs>
  <circle cx="200" cy="200" r="190" fill="url(#bgGrad)" stroke="#ffcf6a" stroke-opacity="0.25" stroke-width="2"/>
  <!-- life ring -->
  <circle cx="200" cy="185" r="88" fill="none" stroke="url(#fireGrad)" stroke-width="22"/>
  <circle cx="200" cy="185" r="88" fill="none" stroke="#fff" stroke-width="22" stroke-dasharray="34 34" stroke-dashoffset="17" opacity="0.92"/>
  <circle cx="200" cy="185" r="46" fill="#05060a"/>
  <!-- rope loop hanging -->
  <path d="M140 262 C 130 300, 150 330, 200 335 C 250 330, 270 300, 260 262" fill="none" stroke="#ffcf6a" stroke-width="6" stroke-linecap="round"/>
  <path d="M155 260 C 150 285, 165 305, 200 309 C 235 305, 250 285, 245 260" fill="none" stroke="#ff5b1f" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <!-- carabiner -->
  <ellipse cx="200" cy="322" rx="14" ry="20" fill="none" stroke="#ffcf6a" stroke-width="5"/>
</svg>
