<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffcf6a"/><stop offset="100%" stop-color="#ff5b1f"/>
    </linearGradient>
  </defs>
  <circle cx="200" cy="200" r="190" fill="#0a0d14" stroke="#ffcf6a" stroke-opacity="0.2" stroke-width="2"/>
  <!-- tripod legs -->
  <path d="M200 95 L110 320" stroke="url(#g1)" stroke-width="9" stroke-linecap="round" fill="none"/>
  <path d="M200 95 L290 320" stroke="url(#g1)" stroke-width="9" stroke-linecap="round" fill="none"/>
  <path d="M200 95 L200 330" stroke="url(#g1)" stroke-width="9" stroke-linecap="round" fill="none" opacity="0.55"/>
  <!-- apex -->
  <circle cx="200" cy="95" r="12" fill="#fff"/>
  <!-- pulley / winch drum -->
  <circle cx="200" cy="95" r="22" fill="none" stroke="#fff" stroke-width="5" opacity="0.85"/>
  <!-- descent line -->
  <path d="M200 117 L200 260" stroke="#fff" stroke-width="4" stroke-dasharray="3 8" stroke-linecap="round"/>
  <!-- harness ring at bottom -->
  <circle cx="200" cy="270" r="16" fill="none" stroke="#ffcf6a" stroke-width="6"/>
  <!-- winch box on one leg -->
  <rect x="95" y="230" width="46" height="34" rx="6" fill="none" stroke="#fff" stroke-width="5"/>
  <circle cx="118" cy="247" r="8" fill="none" stroke="#ff5b1f" stroke-width="4"/>
</svg>
